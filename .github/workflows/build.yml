name: Build Rust Trainer

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Find the folder that actually contains CMakeLists.txt
      # (works whether you init the repo at rust-trainer/ or one level up).
      - name: Locate project
        id: proj
        shell: bash
        run: |
          if [ -f CMakeLists.txt ]; then echo "dir=." >> "$GITHUB_OUTPUT"; else echo "dir=rust-trainer" >> "$GITHUB_OUTPUT"; fi

      - name: Configure (CMake)
        run: cmake -S ${{ steps.proj.outputs.dir }} -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-trainer
          path: build/Release/rust_trainer.dll
