name: Build Rust Trainer

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Locate the folder that contains CMakeLists.txt
      # (handles both "rust-trainer/" and repo-root layouts).
      - name: Locate project
        id: proj
        shell: bash
        run: |
          if [ -f CMakeLists.txt ]; then echo "dir=." >> "$GITHUB_OUTPUT"; else echo "dir=rust-trainer" >> "$GITHUB_OUTPUT"; fi

      - name: Configure (CMake)
        run: cmake -S ${{ steps.proj.outputs.dir }} -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-trainer-dll
          path: build/Release/rust_trainer.dll
          if-no-files-found: warn

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/rust_trainer.dll
          name: Rust Trainer ${{ github.ref_name }}
          draft: false
          prerelease: false
