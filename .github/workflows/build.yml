name: Build Rust Trainer

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ImGui
        run: |
          curl -L https://github.com/ocornut/imgui/archive/refs/heads/master.zip -o imgui.zip
          7z x imgui.zip -y
          robocopy imgui-master src/imgui *.cpp *.h *.inl /S
          if %errorlevel% leq 7 exit /b 0
        shell: cmd

      - name: Configure (CMake)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-trainer-dll
          path: build/Release/rust_trainer.dll
          if-no-files-found: warn
